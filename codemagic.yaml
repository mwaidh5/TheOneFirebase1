# Codemagic CI config — builds the Capacitor iOS app and uploads it to TestFlight.
# The web app lives in the-one/ and the iOS project in the-one/ios/App.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
workflows:
  ios-testflight:
    name: iOS – TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Must match the App Store Connect API key integration name in
      # Codemagic → Team settings → Integrations → App Store Connect.
      app_store_connect: AppStoreConnect
    environment:
      # No ios_signing block on purpose: that triggers Codemagic's automatic
      # signing, which only FETCHES existing profiles and fails before our
      # scripts run. We create the signing files explicitly below instead.
      node: 22
      xcode: latest
      vars:
        XCODE_PROJECT: "the-one/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install npm dependencies
        script: |
          cd the-one
          npm ci
      - name: Build web assets (Vite)
        script: |
          cd the-one
          npm run build
      - name: Capacitor sync iOS
        script: |
          cd the-one
          npx cap sync ios
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Generate a certificate private key
        # Needed so --create can mint a brand-new distribution certificate
        # (account has none yet). Reused below to import it into the keychain.
        script: |
          openssl genrsa -out /tmp/cert_key.pem 2048
      - name: Fetch or create signing files
        # --create registers the App ID and creates the App Store provisioning
        # profile (and a distribution certificate) if they don't exist yet.
        script: |
          app-store-connect fetch-signing-files "com.theone.training" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
      - name: Add certificates to keychain
        # The fetch step above already saved the certificate (with its private
        # key) to disk; add-certificates imports it — no extra flags needed.
        script: |
          keychain add-certificates
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Uploads the build to TestFlight automatically after a successful build.
        submit_to_testflight: true

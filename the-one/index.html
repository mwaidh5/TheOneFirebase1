
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The One Training</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;900&family=Lexend:wght@300;400;500;600;700;900&family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#000000',
                            50: '#f6f6f6',
                            100: '#e7e7e7',
                            200: '#d1d1d1',
                            300: '#b0b0b0',
                            400: '#888888',
                            500: '#6d6d6d',
                            600: '#5d5d5d',
                            700: '#4f4f4f',
                            800: '#454545',
                            900: '#3d3d3d',
                            950: '#000000',
                        },
                        accent: '#137fec',
                        surface: '#f6f7f8',
                    },
                    fontFamily: {
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                        lexend: ['Lexend', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* Prevent iOS rubber-band overscroll from revealing a black background
           behind the WebView: paint html white and damp the bounce. */
        html { background-color: #ffffff; overscroll-behavior-y: none; }
        body { background-color: #ffffff; overscroll-behavior-y: none; }
        /* Native app only: lock the page and scroll inside #root so the fixed
           bottom tab bar can't shift during overscroll. */
        html.native-app, html.native-app body { height: 100%; overflow: hidden; }
        html.native-app #root { height: 100%; overflow-y: auto; overflow-x: hidden; overscroll-behavior-y: none; -webkit-overflow-scrolling: touch; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1; }
        /* Arabic / RTL: swap body font to Cairo, keep ltr-locked things (timers, numbers) readable. */
        html[dir="rtl"] body, html[dir="rtl"] .font-body, html[dir="rtl"] .font-display, html[dir="rtl"] .font-lexend {
            font-family: 'Cairo', 'Tajawal', system-ui, sans-serif;
        }
        html[dir="rtl"] .tabular-nums { direction: ltr; unicode-bidi: isolate; display: inline-block; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="font-body text-slate-900 bg-white min-h-screen">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>

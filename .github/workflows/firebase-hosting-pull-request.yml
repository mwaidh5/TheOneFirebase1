# Builds the app and deploys it to a TEMPORARY preview URL for every Pull Request.
# The preview link is posted automatically as a comment on the PR. Nothing goes
# live until the PR is merged into main (see firebase-hosting-merge.yml).
name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: the-one
      - run: npm run build
        working-directory: the-one
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THEONEFIREBASE1 }}
          projectId: theonefirebase1-42441499-db7a8
